<div class="container">

    <div class="card">
        <h2>Percentage Calculator</h2>
        <input id="m" placeholder="Marks">
        <input id="t" placeholder="Total">
        <button onclick="calc()">Calculate</button>
        <p id="res"></p>
    </div>

</div>

<script>
function calc() {
    let m = document.getElementById("m").value;
    let t = document.getElementById("t").value;
    let r = (m / t) * 100;
    document.getElementById("res").innerText = "Percentage: " + r.toFixed(2) + "%";
}
</script>
